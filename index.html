<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Creator Compass Lite</title>
    <meta name="description" content="Steer creative projects with visible priorities, friction, and momentum." />
    <link rel="stylesheet" href="./styles/app.css" />
  </head>
  <body style="--primary:#fb923c;--secondary:#fdba74;--panel:#1a1108;--edge:#5d3512;--glow:rgba(251, 146, 60, 0.22)">
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Local-first micro app</p>
          <h1>Creator Compass Lite</h1>
          <p class="lede">Steer creative projects with visible priorities, friction, and momentum.</p>
        </div>
        <div class="actions">
          <button class="btn" data-action="import">Import</button>
          <button class="btn" data-action="export">Export</button>
          <button class="btn btn-primary" data-action="new">New project</button>
          <input id="import-file" type="file" accept=".json,application/json" hidden />
        </div>
      </header>

      <section class="hero card">
        <div>
          <p class="eyebrow">Projects board</p>
          <h2 data-role="board-title"></h2>
          <p data-role="board-subtitle"></p>
        </div>
        <p class="accent">Creative work needs direction just as much as inspiration.</p>
      </section>

      <section class="stats" data-role="stats"></section>

      <section class="controls card">
        <label>
          <span>Search</span>
          <input type="search" data-field="search" placeholder="Search projects..." />
        </label>
        <label>
          <span>Project type</span>
          <select data-field="category"></select>
        </label>
        <label>
          <span>Status</span>
          <select data-field="status"></select>
        </label>
        <button class="btn" type="button" data-action="reset">Re-seed sample</button>
      </section>

      <section class="workspace">
        <article class="card list-panel">
          <div class="panel-head">
            <div>
              <strong>Projects</strong>
              <p>Sorted by signal minus friction.</p>
            </div>
            <span class="chip" data-role="count"></span>
          </div>
          <div class="list" data-role="list"></div>
        </article>
        <article class="card editor-panel" data-role="editor"></article>
      </section>
    </div>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
